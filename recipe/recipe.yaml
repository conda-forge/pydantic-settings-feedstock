schema_version: 1

context:
  name: pydantic-settings
  version: "2.14.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pydantic_settings-${{ version }}.tar.gz
  sha256: e874d3bec7e787b0c9958277956ed9b4dd5de6a80e162188fdaff7c5e26fd5fa

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - typing-inspection >=0.4.0
    - python >=${{ python_min }}
    - pydantic >=2.7.0
    - python-dotenv >=0.21.0

tests:
  - python:
      imports:
        - pydantic_settings
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Settings management using Pydantic
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pydantic/pydantic-settings
  repository: https://github.com/pydantic/pydantic-settings
  documentation: https://docs.pydantic.dev/latest/usage/pydantic_settings/

extra:
  recipe-maintainers:
    - jan-janssen
    - fhoehle
